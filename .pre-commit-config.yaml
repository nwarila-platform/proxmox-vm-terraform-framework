repos:
  - repo: local
    hooks:
      - id: terraform_fmt
        name: terraform fmt
        entry: terraform -chdir=terraform fmt -recursive
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_validate
        name: terraform validate
        entry: bash -c "terraform -chdir=terraform init -backend=false -input=false && terraform -chdir=terraform validate"
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_tflint
        name: tflint
        entry: bash -c 'tflint --config "$PWD/.tflint.hcl" --chdir terraform'
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_trivy
        name: trivy terraform config scan
        entry: trivy config --severity HIGH,CRITICAL --skip-dirs .terraform terraform/
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks detect --source . --redact --verbose
        language: system
        pass_filenames: false
        always_run: true

      - id: terraform_docs
        name: terraform-docs
        entry: terraform-docs markdown table --output-file ../docs/reference/terraform.md --output-mode inject terraform
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: docs-layout
        name: docs layout
        entry: python tools/check_docs_layout.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$|^tools/check_docs_layout.py$
