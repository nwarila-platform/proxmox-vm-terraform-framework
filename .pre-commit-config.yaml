---
repos:
  - repo: local
    hooks:
      - id: conventional-pre-commit
        name: conventional commit message
        entry: conventional-pre-commit
        language: system
        pass_filenames: false
        stages: [commit-msg]

      - id: detect-private-key
        name: detect private key
        entry: detect-private-key
        language: system
        files: .*

      - id: yamllint
        name: yamllint
        entry: python -m yamllint --config-file .config/.yamllint.yaml
        language: system
        files: \.(yaml|yml)$

      - id: markdownlint
        name: markdownlint
        entry: markdownlint-cli2 --config .config/.markdownlint.json
        language: system
        files: \.md$

      - id: terraform_fmt
        name: terraform fmt
        entry: terraform -chdir=terraform fmt -recursive
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_validate
        name: terraform validate
        entry: >-
          bash -c "terraform -chdir=terraform init -backend=false -input=false
          && terraform -chdir=terraform validate"
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_tflint
        name: tflint
        entry: bash -c 'tflint --config "$PWD/.tflint.hcl" --chdir terraform'
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: terraform_trivy
        name: trivy terraform config scan
        entry: trivy config --severity HIGH,CRITICAL --skip-dirs .terraform terraform/
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks detect --source . --redact --verbose
        language: system
        pass_filenames: false
        always_run: true

      - id: terraform_docs
        name: terraform-docs
        entry: >-
          terraform-docs markdown table --config .terraform-docs.yml
          --output-file ../docs/reference/terraform.md --output-mode inject terraform
        language: system
        pass_filenames: false
        files: ^terraform/.*\.tf$

      - id: docs-layout
        name: docs layout
        entry: python tools/check_docs_layout.py
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$|^tools/check_docs_layout.py$
