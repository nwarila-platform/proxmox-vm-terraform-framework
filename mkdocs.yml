---
site_name: proxmox-vm-terraform-framework
site_description: Production-grade Terraform framework for managing Proxmox VE infrastructure
site_url: https://nwarila-platform.github.io/proxmox-vm-terraform-framework/
repo_url: https://github.com/nwarila-platform/proxmox-vm-terraform-framework
repo_name: nwarila-platform/proxmox-vm-terraform-framework
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025 NWarila &mdash; MIT License

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NWarila
      name: NWarila on GitHub

nav:
  - Home: README.md
  - Getting Started: how-to/getting-started.md
  - Develop This Module: how-to/develop-this-module.md
  - Architecture: explanation/architecture.md
  - Testing Strategy: explanation/testing-strategy.md
  - Threat Model: explanation/threat-model.md
  - Invariants: reference/invariants.md
  - Release Gates: reference/release-gates.md
  - Module Reference: reference/terraform.md
  - Decision Records: decision-records/README.md
  - Security Report: reference/security.md
  - Changelog: reference/changelog.md
  - Contributing: how-to/contributing.md
