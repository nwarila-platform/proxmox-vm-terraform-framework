name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/docs.txt

      - name: Install MkDocs Material
        run: pip install -r requirements/docs.txt

      - name: Install terraform-docs
        uses: terraform-docs/gh-actions@v1
        with:
          working-dir: terraform/
          config-file: ../.config/.terraform-docs.yml
          output-file: ../docs/TERRAFORM.md
          output-method: replace
          git-push: false

      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-report.txt
          severity: HIGH,CRITICAL
          scanners: misconfig,secret
          skip-dirs: .terraform
          exit-code: "0"

      - name: Build security report page
        run: |
          {
            echo "# Security Report"
            echo ""
            echo "!!! info \"About this report\""
            echo "    Automated Trivy scan run on every push to \`main\`."
            echo "    Covers: infrastructure misconfigurations, exposed secrets."
            echo "    Severity filter: **HIGH** and **CRITICAL** only."
            echo ""
            echo "    Last updated: **$(date -u '+%Y-%m-%d %H:%M UTC')**"
            echo ""
            echo "    Full SARIF results are available in the"
            echo "    [Security tab](https://github.com/nwarila-platform/proxmox-vm-terraform-framework/security/code-scanning)."
            echo ""
            if [ -s trivy-report.txt ] && grep -qv '^\s*$' trivy-report.txt; then
              echo "\`\`\`text"
              cat trivy-report.txt
              echo "\`\`\`"
            else
              echo "!!! success \"Clean — no issues found\""
              echo "    No HIGH or CRITICAL findings detected in this scan."
            fi
          } > docs/security.md

      - name: Prepare contributing and changelog pages
        run: |
          cp CONTRIBUTING.md docs/contributing.md
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md docs/changelog.md
          else
            printf '# Changelog\n\nNo releases yet.\n\nThis changelog is automatically generated by [release-please](https://github.com/googleapis/release-please) from [Conventional Commits](https://www.conventionalcommits.org/) on every merge to `main`.\n' > docs/changelog.md
          fi

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
