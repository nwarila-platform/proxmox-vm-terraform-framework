---
name: Template Sync

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: template-sync
  cancel-in-progress: false

jobs:
  sync:
    permissions:
      contents: write # required for the reusable template sync workflow to update mirrored files
      pull-requests: write # required for the reusable template sync workflow to open or update sync PRs
    # NWarila/terraform-framework-template main @ 2026-05-27
    uses: NWarila/terraform-framework-template/.github/workflows/reusable-template-sync.yaml@efcf3274d8bc6f4b192be063db8f284db6d9423a
    with:
      template_ref: efcf3274d8bc6f4b192be063db8f284db6d9423a
