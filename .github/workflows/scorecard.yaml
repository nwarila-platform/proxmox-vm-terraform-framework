---
name: Scorecard

on:
  branch_protection_rule: {}
  schedule:
    - cron: "17 6 * * 2"
  push:
    branches: [main]
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: scorecard
  cancel-in-progress: false

jobs:
  analysis:
    permissions:
      security-events: write # required to upload Scorecard SARIF
      id-token: write # required by OpenSSF Scorecard tokenless attestation
      actions: read # required by code-scanning upload metadata
      contents: read # required by Scorecard repository checks
    uses: nwarila-platform/.github/.github/workflows/reusable-scorecard.yaml@0d2a0752d4c618907d735af4a7c12a9214c8517e
