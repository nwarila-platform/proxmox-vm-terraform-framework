---
name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "30 6 * * 0"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      contents: read # required by the reusable CodeQL workflow to inspect repository content
      security-events: write # required to upload CodeQL SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    # NWarila/terraform-framework-template main @ 2026-05-27
    uses: NWarila/terraform-framework-template/.github/workflows/reusable-codeql.yaml@efcf3274d8bc6f4b192be063db8f284db6d9423a
