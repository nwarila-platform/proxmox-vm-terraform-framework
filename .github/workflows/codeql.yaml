---
name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "30 6 * * 0"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    permissions:
      contents: read # required by the reusable CodeQL workflow to inspect repository content
      security-events: write # required to upload CodeQL SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    uses: nwarila-platform/.github/.github/workflows/reusable-codeql.yaml@0d2a0752d4c618907d735af4a7c12a9214c8517e
