---
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read # required by the reusable scanner to inspect repository content
      security-events: write # required to upload IaC and secret-scan SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    uses: nwarila-platform/.github/.github/workflows/reusable-iac-security.yaml@0d2a0752d4c618907d735af4a7c12a9214c8517e
