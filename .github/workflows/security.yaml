---
name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group: {}
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read # required by the reusable scanner to inspect repository content
      security-events: write # required to upload IaC and secret-scan SARIF
      actions: read # required by CodeQL upload-sarif to associate results with the run
    # NWarila/terraform-framework-template main @ 2026-05-27
    uses: NWarila/terraform-framework-template/.github/workflows/reusable-iac-security.yaml@efcf3274d8bc6f4b192be063db8f284db6d9423a
