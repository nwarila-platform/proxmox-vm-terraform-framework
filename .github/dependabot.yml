version: 2
updates:

  # GitHub Actions — workflow steps and composite actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    target-branch: "PROD"

  # Terraform — provider and module versions
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "daily"
    target-branch: "PROD"

  # Devcontainer — feature versions in devcontainer.json
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "PROD"

  # Docker — base image in .devcontainer/Dockerfile
  - package-ecosystem: "docker"
    directory: "/.devcontainer"
    schedule:
      interval: "weekly"
    target-branch: "PROD"

  # pip — docs build dependencies (mkdocs-material, etc.)
  - package-ecosystem: "pip"
    directory: "/requirements"
    schedule:
      interval: "weekly"
    target-branch: "PROD"
