# ============================================================================ #
#  terraform-docs Configuration                                                #
#  https://terraform-docs.io/user-guide/configuration/                         #
# ============================================================================ #

formatter: markdown table

version: ">= 0.19.0"

header-from: docs/TERRAFORM_HEADER.md

recursive:
  enabled: false

sections:
  show:
    - header
    - requirements
    - providers
    - inputs
    - outputs
    - resources

content: ""

output:
  file: docs/TERRAFORM.md
  mode: replace
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

output-values:
  enabled: false

sort:
  enabled: true
  by: required

settings:
  anchor: true
  color: true
  default: true
  description: true
  escape: true
  hide-empty: false
  html: true
  indent: 2
  lockfile: true
  read-comments: true
  required: true
  sensitive: true
  type: true
